<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker — Sign In</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="shortcut icon" href="./assets/favicon.webp" type="image/x-icon">
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="flex min-h-screen items-center justify-center bg-[#F8FAFC] font-geist text-[#1F2937]"
  >
    <main
      class="mx-auto flex min-h-screen w-full max-w-[1600px] flex-col items-center justify-center gap-[30px] px-4 py-8 sm:px-6 sm:py-10 lg:h-[900px] lg:px-[245px] lg:py-[60px]"
    >
      <section
        class="flex w-full max-w-[520px] flex-col items-stretch justify-center gap-[24px] rounded-[8px] border border-white bg-white p-[24px] shadow-[0px_5px_10px_0px_rgba(0,0,0,0.08)] sm:p-[32px]"
        aria-label="Sign in"
      >
        <header class="flex flex-col items-center gap-[24px] self-stretch">
          <img
            src="./assets/Github.gif"
            alt="GitHub logo"
            class="h-[200px] w-[200px] mb-[-40px]"
          />

          <div class="flex flex-col items-center gap-[4px] self-stretch">
            <h1 class="text-center text-[24px] font-semibold leading-[1.3]">
              GitHub Issues Tracker
            </h1>
            <p
              class="text-center text-[16px] font-normal leading-[1.3] text-[#64748B]"
            >
              Sign in to manage your issues
            </p>
          </div>
        </header>

        <form
          class="flex flex-col gap-[24px] self-stretch"
          onsubmit="handleLogin(event)"
        >
          <div class="flex flex-col gap-[16px] self-stretch">
            <div class="flex flex-col gap-[8px] self-stretch">
              <label
                for="username"
                class="text-[16px] font-medium leading-[1.3]"
              >
                Username
              </label>
              <div class="flex flex-col gap-[6px] self-stretch">
                <input
                  id="username"
                  name="username"
                  type="text"
                  placeholder="Enter Username"
                  required
                  class="w-full rounded-[8px] border border-[#E4E4E7] bg-white px-[16px] py-[16px] text-[16px] font-normal leading-[1] text-[#1F2937] placeholder:text-[#64748B] focus:border-[#E4E4E7] focus:outline-none"
                />
                <p class="text-[14px] font-normal leading-[1.3] text-[#4A00FF]">
                  Default: admin
                </p>
              </div>
            </div>

            <div class="flex flex-col gap-[8px] self-stretch">
              <label
                for="password"
                class="text-[16px] font-medium leading-[1.3]"
              >
                Password
              </label>
              <div class="flex flex-col gap-[6px] self-stretch">
                <div class="relative w-full">
                  <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="Enter Password"
                    required
                    class="w-full rounded-[8px] border border-[#E4E4E7] bg-white px-[16px] py-[16px] pr-[44px] text-[16px] font-normal leading-[1] text-[#1F2937] placeholder:text-[#64748B] focus:border-[#E4E4E7] focus:outline-none"
                  />
                  <button
                    type="button"
                    onclick="togglePasswordVisibility()"
                    id="passwordToggleButton"
                    class="absolute inset-y-0 right-0 flex items-center pr-4 text-[#64748B] hover:text-[#1F2937]"
                    aria-label="Show password"
                  >
                    <i id="passwordToggleIcon" class="fa-regular fa-eye text-[18px]"></i>
                  </button>
                </div>
                <p class="text-[14px] font-normal leading-[1.3] text-[#4A00FF]">
                  Default: admin123
                </p>
              </div>
            </div>
          </div>

          <button
            type="submit"
            class="flex w-full items-center justify-center gap-[6px] rounded-[8px] bg-[#4A00FF] px-[16px] py-[16px]"
          >
            <span class="text-[16px] font-semibold leading-[1] text-white"
              >Sign In</span
            >
          </button>
        </form>

        <div class="flex items-center gap-[8px] self-stretch">
          <div class="h-px flex-1 bg-[#E4E4E7]"></div>
          <p class="text-[16px] font-normal leading-[1.3]">OR</p>
          <div class="h-px flex-1 bg-[#E4E4E7]"></div>
        </div>

        <div class="flex flex-col items-center gap-[8px] self-stretch">
          <p class="text-[14px] font-normal leading-[1.3] text-[#64748B]">
            Demo Credentials:
          </p>

          <div
            class="flex w-full items-center justify-center rounded-[8px] bg-[#F8FAFC] px-[24px] py-[24px]"
          >
            <p class="text-center text-[16px] font-normal leading-[1.3]">
              Username: admin<br />
              Password: admin123
            </p>
          </div>
        </div>
      </section>
    </main>

    <script src="./JavaScript/login.js"></script>
  </body>
</html>
