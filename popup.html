<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker — Issue Details</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind = tailwind || {};
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              geist: ["Geist", "ui-sans-serif", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body class="min-h-screen bg-[#F8FAFC] font-geist text-[#1F2937]">
    <!-- Backdrop overlay -->
    <div
      class="fixed inset-0 z-40 flex items-center justify-center bg-black/50 px-4"
      aria-modal="true"
      role="dialog"
      aria-labelledby="popup-title"
    >
      <!-- Popup Card - 700px width, 12px radius, 32px padding -->
      <div
        class="flex w-full max-w-[700px] flex-col justify-center gap-6 rounded-xl bg-white p-6 sm:p-8 max-h-[90vh] overflow-y-auto"
      >
        <!-- Header: Title + Metadata -->
        <div class="flex flex-col gap-2">
          <h2 id="popup-title" class="text-[24px] font-bold leading-[1.3]">
            Fix broken image uploads
          </h2>
          <div class="flex flex-wrap items-center gap-2">
            <span
              class="flex h-6 items-center justify-center gap-1.5 rounded-full bg-[#00A96E] px-2 py-2 text-[12px] font-medium leading-none text-white"
              >Opened</span
            >
            <span class="h-1 w-1 shrink-0 rounded-full bg-[#64748B]"></span>
            <span class="text-[12px] font-normal leading-[1.3] text-[#64748B]"
              >Opened by <span id="popup-author">Fahim Ahmed</span></span
            >
            <span class="h-1 w-1 shrink-0 rounded-full bg-[#64748B]"></span>
            <span
              class="text-[12px] font-normal leading-[1.3] text-[#64748B]"
              id="popup-date"
              >22/02/2026</span
            >
          </div>
        </div>

        <!-- Labels -->
        <div id="popup-labels" class="flex items-center gap-1">
          <!-- Labels will be inserted here -->
        </div>

        <!-- Description -->
        <p
          id="popup-description"
          class="text-[16px] font-normal leading-[1.3] text-[#64748B]"
        >
          The navigation menu doesn't collapse properly on mobile devices. Need
          to fix the responsive behavior.
        </p>

        <!-- Assignee & Priority box -->
        <div
          class="flex w-full flex-row justify-stretch gap-2.5 rounded-lg bg-[#F8FAFC] p-4"
        >
          <div class="flex flex-1 flex-col justify-center gap-1">
            <span class="text-[16px] font-normal leading-[1.3] text-[#64748B]"
              >Status:</span
            >
            <span
              id="popup-status"
              class="text-[16px] font-semibold leading-[1.3]"
              >Opened</span
            >
          </div>
          <div class="flex flex-shrink-0 flex-col justify-center gap-1">
            <span class="text-[16px] font-normal leading-[1.3] text-[#64748B]"
              >Priority:</span
            >
            <span
              id="popup-priority"
              class="inline-flex h-6 w-[60px] items-center justify-center gap-1.5 rounded-full bg-[#EF4444] px-2 py-2 text-[12px] font-medium uppercase leading-none text-white"
              >High</span
            >
          </div>
        </div>

        <!-- Close button -->
        <div class="flex justify-end gap-4">
          <a
            href="main.html"
            class="flex h-11 items-center justify-center gap-1 rounded px-4 py-3 bg-[#4A00FF] text-[16px] font-semibold leading-[1.3] text-white no-underline hover:bg-[#3a00dd]"
          >
            Back to Issues
          </a>
        </div>
      </div>
    </div>

    <script>
      // Check if user is logged in
      if (!localStorage.getItem("isLoggedIn")) {
        window.location.href = "index.html";
      }

      // Get issue ID from URL parameter
      const params = new URLSearchParams(window.location.search);
      const issueId = params.get("id");

      // Load issue details
      async function loadIssueDetails() {
        if (!issueId) {
          window.location.href = "main.html";
          return;
        }

        try {
          const res = await fetch(
            `https://phi-lab-server.vercel.app/api/v1/lab/issue/${issueId}`,
          );
          const data = await res.json();
          const issue = data.data;

          // Set title
          document.getElementById("popup-title").textContent = issue.title;

          // Set author and date
          document.getElementById("popup-author").textContent = issue.author;
          const dateObj = new Date(issue.createdAt);
          const formattedDate = dateObj.toLocaleDateString("en-US", {
            month: "numeric",
            day: "numeric",
            year: "numeric",
          });
          document.getElementById("popup-date").textContent = formattedDate;

          // Set status
          const statusText = issue.status === "open" ? "Opened" : "Closed";
          document.getElementById("popup-status").textContent = statusText;

          // Set description
          document.getElementById("popup-description").textContent =
            issue.description || "No description provided";

          // Set priority
          const priorityEl = document.getElementById("popup-priority");
          priorityEl.textContent = issue.priority.toUpperCase();

          const priorityColorMap = {
            high: "bg-[#EF4444]",
            medium: "bg-[#F59E0B]",
            low: "bg-[#10B981]",
          };
          const priorityColor =
            priorityColorMap[issue.priority.toLowerCase()] || "bg-[#EF4444]";
          priorityEl.className = `inline-flex h-6 items-center justify-center gap-1.5 rounded-full px-2 py-2 text-[12px] font-medium uppercase leading-none text-white ${priorityColor}`;

          // Set labels
          const labelsContainer = document.getElementById("popup-labels");
          labelsContainer.innerHTML = "";
          const labels = Array.isArray(issue.labels)
            ? issue.labels
            : issue.labels
              ? [issue.labels]
              : [];

          labels.forEach((label) => {
            const labelColorMap = {
              bug: {
                bg: "bg-[#FEECEC]",
                border: "border-[#FECACA]",
                text: "text-[#EF4444]",
              },
              enhancement: {
                bg: "bg-[#F0E2FF]",
                border: "border-[#E9D5FF]",
                text: "text-[#10B981]",
              },
              "help wanted": {
                bg: "bg-[#FFF6D1]",
                border: "border-[#FDE68A]",
                text: "text-[#D97706]",
              },
              documentation: {
                bg: "bg-[#DBEAFE]",
                border: "border-[#BFDBFE]",
                text: "text-[#3B82F6]",
              },
              "good first issue": {
                bg: "bg-[#ECFDF5]",
                border: "border-[#BBFAB0]",
                text: "text-[#059669]",
              },
            };
            const colors =
              labelColorMap[label.toLowerCase()] || labelColorMap["bug"];

            let iconHTML = "";
            const labelLower = label.toLowerCase();
            if (labelLower === "documentation") {
              iconHTML = '<i class="fa-solid fa-file-code"></i>';
            } else if (labelLower === "good first issue") {
              iconHTML = '<i class="fa-solid fa-star"></i>';
            } else {
              const iconMap = {
                bug: "BugDroid.svg",
                enhancement: "EnhanceMent.svg",
                "help wanted": "HelpWanted.svg",
              };
              const iconFile = iconMap[labelLower] || "documentation.svg";
              iconHTML = `<img src="./assets/${iconFile}" alt="${label}" class="h-4 w-4" />`;
            }

            const labelEl = document.createElement("span");
            labelEl.className = `inline-flex items-center gap-0.5 rounded-full border px-2.5 py-1 text-[12px] font-medium uppercase leading-tight whitespace-nowrap flex-shrink-0 ${colors.border} ${colors.bg}`;
            labelEl.style.color = colors.text;
            labelEl.innerHTML = `${iconHTML}${label}`;
            labelsContainer.appendChild(labelEl);
          });
        } catch (error) {
          console.error("Error loading issue details:", error);
          document.getElementById("popup-title").textContent =
            "Error loading issue";
          document.getElementById("popup-description").textContent =
            "Failed to load issue details. Please try again.";
        }
      }

      // Load details on page load
      loadIssueDetails();
    </script>
  </body>
</html>
